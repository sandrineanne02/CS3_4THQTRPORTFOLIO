<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie List - Q4 First Graded Exercise</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#cae0e8;
    padding:30px;
}

.container{
    width:320px;
    margin:auto;
    background:white;
    padding:20px;
    border-radius:8px;
    box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:15px;
}

label{
    font-size:14px;
    margin-top:8px;
    display:block;
}

input,select{
    width:100%;
    padding:6px;
    margin-top:4px;
    border:1px solid #ccc;
    border-radius:4px;
}

.stars{
    margin-top:5px;
}

.star{
    font-size:20px;
    cursor:pointer;
    color:#ccc;
}

.star.selected{
    color:gold;
}

button{
    width:100%;
    margin-top:12px;
    padding:8px;
    background:#2c667a;
    border:none;
    color:white;
    border-radius:4px;
    cursor:pointer;
    font-weight:bold;
}

button:hover{
    background:#23555f;
}

#movieList{
    margin-top:20px;
}

.movieItem{
    background:#fafafa;
    padding:8px;
    margin-top:8px;
    border-radius:4px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="container">

<h2>Add a Movie</h2>

<form id="movieForm">

<label>Title:</label>
<input type="text" id="title">

<label>Year:</label>
<input type="text" id="year">

<label>Genre:</label>
<select id="genre">
<option>Action</option>
<option>Romance</option>
<option>Comedy</option>
<option>Drama</option>
<option>Horror</option>
<option>Science Fiction</option>
<option>Thriller</option>
</select>

<label>Rating:</label>

<div class="stars">
<span class="star" data-value="1">★</span>
<span class="star" data-value="2">★</span>
<span class="star" data-value="3">★</span>
<span class="star" data-value="4">★</span>
<span class="star" data-value="5">★</span>
</div>

<button type="submit">Add Movie</button>

</form>

<h3 style="text-align:center;margin-top:15px;">Movie List</h3>

<div id="movieList"></div>

</div>

<script>
const form = document.getElementById("movieForm");
const movieList = document.getElementById("movieList");
const stars = document.querySelectorAll(".star");

let rating = 0;

stars.forEach(star=>{
    star.addEventListener("click",()=>{
        rating = star.dataset.value;
        updateStars();
    });
});

function updateStars(){
    stars.forEach(star=>{
        star.classList.remove("selected");
        if(star.dataset.value <= rating){
            star.classList.add("selected");
        }
    });
}

function displayMovies(){
    movieList.innerHTML="";
    const movies = JSON.parse(localStorage.getItem("movies")) || [];
    movies.forEach(movie=>{
        const div = document.createElement("div");
        div.classList.add("movieItem");
        let starDisplay = "★".repeat(movie.rating) + "☆".repeat(5 - movie.rating);
        div.innerHTML = movie.title + " (" + movie.year + ") - " + movie.genre + ", Rating: " + starDisplay;
        movieList.appendChild(div);
    });
}

form.addEventListener("submit",function(e){
    e.preventDefault();
    const title = document.getElementById("title").value;
    const year = document.getElementById("year").value;
    const genre = document.getElementById("genre").value;

    const movie = {
        title: title,
        year: year,
        genre: genre,
        rating: Number(rating)
    };

    let movies = JSON.parse(localStorage.getItem("movies")) || [];
    movies.push(movie);
    localStorage.setItem("movies", JSON.stringify(movies));

    form.reset();
    rating = 0;
    updateStars();
    displayMovies();
});

displayMovies();
</script>

</body>
</html>
